# ============================================================
#  miniLISA Testbed Configuration
#  Photodetector variant: FEMTO HBPR-100M-60K-IN-FST
#  (Balanced InGaAs, DC–100 MHz, free-space, switchable TIA)
#  *** BALANCED noise model — CMRR_dB set, 1f-RIN suppression active ***
# ============================================================
#
#  PD-SPECIFIC NOTES
#  -----------------
#  The HBPR is a BALANCED detector physically, but this config is
#  for use with the UNBALANCED noise budget script (no CMRR applied
#  to RIN terms).  Power levels are therefore set conservatively
#  using the DIFFERENTIAL saturation limit, not the common-mode
#  10 mW limit that balanced operation would allow.
#
#  *** POWER HANDLING (unbalanced model) ***
#
#  Saturation is set by the differential (single-port) limit:
#       Low gain  (Z = 20 kOhm): max 53 uW differential @ 1550 nm
#                                 -> ~67 uW @ 1064 nm (scaled by R ratio)
#       High gain (Z = 60 kOhm): max 18 uW differential @ 1550 nm
#                                 -> ~23 uW @ 1064 nm
#       In AC-coupled mode: 275 uW differential regardless of gain.
#  Each beam is treated as an independent input; keep P_i and P_REF
#  each below ~30 uW (low-gain) to stay within the linear range.
#
#  NOTE: Once the noise budget script is updated to model balanced
#  detection (CMRR applied to 1f-RIN), switch back to the common-mode
#  power limit (up to ~5 mW per beam) and add CMRR_dB here.
#
#  GAIN SETTINGS (TWO SWITCHABLE):
#  This toml uses the LOW-GAIN (Z = 20 kΩ) setting, which gives:
#    - Higher saturation headroom (67 µW differential)
#    - Full 100 MHz bandwidth
#    - NEP ~7.1 pW/√Hz at 50 MHz, 12.0 pW/√Hz at 100 MHz
#  Switch to HIGH-GAIN (Z = 60 kΩ) for lower noise at the cost of
#  tighter differential saturation (23 µW) — update C_pd, S_amp below.
#
#  RESPONSIVITY @ 1064 nm:
#  Datasheet gives 0.95 A/W @ 1550 nm.  InGaAs is fairly flat from
#  1000–1550 nm; at 1064 nm ~0.75 A/W is a reasonable estimate.
#  (Exact value depends on the specific diode batch — measure if possible.)
#
#  S_amp DERIVATION (low-gain setting, 100 MHz bandwidth):
#  NEP = 12.0 pW/√Hz @ 100 MHz (datasheet worst-case across band)
#  NEP_min = 3.7 pW/√Hz (datasheet minimum, low frequency)
#  Input current noise: i_n = NEP × R = 12.0e-12 × 0.75 = 9.0 pA/√Hz
#  S_amp = i_n × Z = 9.0e-12 × 20e3 = 180 nV/√Hz  (100 MHz case)
#  For a more optimistic estimate at your 18 MHz heterodyne frequency,
#  use the intermediate NEP value (~7.1 pW/√Hz @ 50 MHz):
#  S_amp_50MHz = 7.1e-12 × 0.75 × 20e3 = 107 nV/√Hz
#  The conservative (100 MHz) value is used here.
#
#  All frequencies in Hz unless otherwise noted.
# ============================================================


# ------------------------------------------------------------
[beatnote]
# ------------------------------------------------------------

f_het_min = 5e6
f_het_max = 25e6

f_inter_min = 25e6
f_inter_max = 60e6

doppler_max = 2e6

f_het = 18e6


# ------------------------------------------------------------
[modulation]
# ------------------------------------------------------------

nu_m       = 10e6
delta_f_SB = 1e6


# ------------------------------------------------------------
[clocks]
# ------------------------------------------------------------

f_USO = 10e6
f_s   = 80e6


# ------------------------------------------------------------
[geometry]
# ------------------------------------------------------------

tau = 8.33


# ------------------------------------------------------------
[science_band]
# ------------------------------------------------------------

f_science_min = 1e-4
f_science_max = 1.0
f_TDI_null    = 0.060


# ------------------------------------------------------------
[instrument]
# ------------------------------------------------------------
PD_model = "FEMTO_HBPR100M_IN"
m   = 0.53

# ── Photodetector: FEMTO HBPR-100M-60K-IN-FST ────────────
#
# Responsivity @ 1064 nm  (estimated; datasheet gives 0.95 A/W @ 1550 nm)
R   = 0.75          # [A/W]

eta = 0.8

# Effective C_pd for noise model  (LOW-GAIN setting, Z = 20 kΩ)
#   C_pd_eff = 1 / (2π × 18 MHz × 20,000 Ω) = 0.44 pF
# For HIGH-GAIN (Z = 60 kΩ): C_pd_eff = 0.15 pF  — update if switching gain
C_pd = 0.44e-12     # [F]  — low-gain setting

# CMRR [dB]  — common-mode rejection ratio for balanced detection
# Datasheet gives 50 dB typ.  Use a conservative value for the budget.
# When CMRR_dB is present the script applies balanced RIN suppression
# to the 1f-RIN term.  Remove this line to revert to unbalanced model.
CMRR_dB = 40.0      # [dB]  conservative (datasheet typ. 50 dB)
# Replaces individual dark + thermal + amp estimates in the noise budget.
# Datasheet gives: 3.7 pW/√Hz (min), ~7.1 pW/√Hz @ 50 MHz, 12.0 pW/√Hz @ 100 MHz
# Using the value closest to f_het = 18 MHz (~50 MHz band):
NEP = 7.1e-12       # [W/√Hz]  low-gain, ~50 MHz  (use 12e-12 for conservative bound)

# S_amp and I_dark are not needed when NEP is set — kept here commented out
# for reference and for use if NEP is removed.
# S_amp  = 180e-9   # [V/√Hz]  derived: NEP × R × Z = 7.1e-12 × 0.75 × 20e3
# I_dark = 1e-9     # [A]      absorbed into NEP

# *** OPTICAL POWER (balanced model) ***
#
# CMRR_dB is set, so balanced detection is active.
# Power is now limited by the common-mode limit: 10 mW per PD (datasheet).
# Keep beams matched within ~1% to stay below the differential sat. limit.
P_i   = 1e-3        # [W]  SC laser power   — up to ~5 mW with good balance
P_REF = 1e-3        # [W]  reference laser  — keep matched to P_i within ~1%


# ------------------------------------------------------------
[laser]
# ------------------------------------------------------------

wavelength = 1064e-9
RIN_level  = 1e-8


# ------------------------------------------------------------
[noise]
# ------------------------------------------------------------

S_M0       = 1e-14
f_corner_M = 1.5e-2
S_q0       = 1e-14


# ------------------------------------------------------------
[environment]
# ------------------------------------------------------------

T = 300