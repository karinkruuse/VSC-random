# ============================================================
#  miniLISA Testbed Configuration
#  Photodetector variant: Thorlabs PDB415C
#  (Balanced InGaAs, DC–100 MHz, free-space, fixed TIA)
# ============================================================
#
#  PD-SPECIFIC NOTES
#  -----------------
#  The PDB415C is a BALANCED detector with a fixed-gain TIA.
#  Unlike the FEMTO HBPR, it has a SINGLE gain setting (50 kΩ).
#
#  *** POWER HANDLING ***
#
#  The PDB415C saturation figure (72 µW @ 1550 nm) is the total
#  CW optical power on the RF output port — this is the SUM of
#  both input beams, NOT just the imbalance.  This is different
#  from the FEMTO HBPR which separates common-mode and differential
#  limits.  So P_i + P_REF must stay below ~85 µW at 1064 nm.
#
#  Scaling: P_sat(1064) = P_sat(1550) × R(1550)/R(1064)
#           = 72 µW × 1.0/0.85 ≈ 85 µW
#  With P_i = P_REF, each beam should be ≤ 40 µW.
#
#  This is considerably more restrictive than the FEMTO HBPR
#  (which allows 10 mW common-mode).  The PDB415C is therefore
#  better suited than the Menlo FPD510 but weaker than the FEMTO
#  in terms of exploitable optical power.
#
#  RESPONSIVITY @ 1064 nm:
#  Datasheet gives 1.0 A/W peak (typ.) @ ~1550 nm.
#  At 1064 nm, InGaAs responsivity is typically ~0.85 A/W.
#
#  S_amp DERIVATION:
#  NEP = 6.99 pW/√Hz (datasheet, DC–100 MHz)
#  Input current noise: i_n = NEP × R = 6.99e-12 × 0.85 = 5.94 pA/√Hz
#  S_amp = i_n × Z = 5.94e-12 × 50e3 = 297 nV/√Hz
#
#  CMRR: >25 dB (datasheet minimum)
#  Monitor outputs: yes (Monitor+ and Monitor−, SMA)
#
#  All frequencies in Hz unless otherwise noted.
# ============================================================


# ------------------------------------------------------------
[beatnote]
# ------------------------------------------------------------

f_het_min = 5e6
f_het_max = 25e6

f_inter_min = 25e6
f_inter_max = 60e6

doppler_max = 2e6

f_het = 18e6


# ------------------------------------------------------------
[modulation]
# ------------------------------------------------------------

nu_m       = 10e6
delta_f_SB = 1e6


# ------------------------------------------------------------
[clocks]
# ------------------------------------------------------------

f_USO = 10e6
f_s   = 80e6


# ------------------------------------------------------------
[geometry]
# ------------------------------------------------------------

tau = 8.33


# ------------------------------------------------------------
[science_band]
# ------------------------------------------------------------

f_science_min = 1e-4
f_science_max = 1.0
f_TDI_null    = 0.060


# ------------------------------------------------------------
[instrument]
# ------------------------------------------------------------

PD_model = "Thorlabs PDB415C"
m   = 0.53

# ── Photodetector: Thorlabs PDB415C ──────────────────────
#
# Responsivity @ 1064 nm  (estimated; datasheet gives 1.0 A/W peak @ ~1550 nm)
R   = 0.85          # [A/W]

eta = 0.8

# Effective C_pd for noise model  (Z = 50 kΩ, fixed gain)
#   C_pd_eff = 1 / (2π × 18 MHz × 50,000 Ω) = 0.18 pF
C_pd = 0.18e-12     # [F]

# Dark current [A]  (not stated in datasheet; typical InGaAs estimate)
I_dark = 1e-9       # [A]

# TIA voltage noise ASD [V/sqrt(Hz)]
#   NEP = 6.99 pW/√Hz (datasheet, DC–100 MHz)
#   i_n = NEP × R = 6.99e-12 × 0.85 = 5.94 pA/√Hz
#   S_amp = i_n × Z = 5.94e-12 × 50e3 = 297 nV/√Hz
S_amp = 297e-9      # [V/sqrt(Hz)]

# *** OPTICAL POWER — SEE POWER HANDLING NOTES ABOVE ***
#
# Total power (P_i + P_REF) must stay below ~85 µW at 1064 nm.
# With equal beams, each port ≤ 40 µW.
# Default here uses 30 µW per beam, giving 60 µW total (~70% of rail).
#
# To improve SNR, try to get as close to 40 µW per beam as possible
# while monitoring the DC output to confirm linear operation.
P_i   = 30e-6       # [W]  SC laser power   — max ~40 µW per beam
P_REF = 30e-6       # [W]  reference laser power


# ------------------------------------------------------------
[laser]
# ------------------------------------------------------------

wavelength = 1064e-9
RIN_level  = 1e-8


# ------------------------------------------------------------
[noise]
# ------------------------------------------------------------

S_M0       = 1e-14
f_corner_M = 1.5e-2
S_q0       = 1e-14


# ------------------------------------------------------------
[environment]
# ------------------------------------------------------------

T = 300
