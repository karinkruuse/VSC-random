# ============================================================
#  miniLISA Testbed Configuration
#  Photodetector variant: Menlo Systems  FPD510-FC-NIR
#  (InGaAs, DC–200 MHz, fiber-coupled FC/APC, integrated TIA)
# ============================================================
#
#  PD-SPECIFIC NOTES
#  -----------------
#  The FPD510-FC-NIR is an AMPLIFIED detector with an integrated
#  transimpedance amplifier (TIA).  Unlike the bare 50 Ω F-PD-30-1064,
#  Z here is set by the TIA feedback resistor, not the load.
#
#  Key parameters derived from the datasheet:
#
#    Max Gain (datasheet):  1.5e5  V_peak-peak / W_input
#    Responsivity @ 1064 nm:  ~0.65 A/W  (read from spectral curve,
#      FC-NIR trace at 1064 nm; the FS-NIR curve peaks higher)
#    Effective transimpedance:  Z_eff = Gain / R = 1.5e5 / 0.65 ≈ 230 kΩ
#
#  C_pd modelling:
#    The script computes Z = 1/(2π C_pd f_het).  To obtain Z = 230 kΩ
#    at f_het = 18 MHz we set C_pd_eff = 1/(2π × 18e6 × 230e3) ≈ 38 fF.
#    This is an effective modelling parameter — the physical junction
#    capacitance of the InGaAs diode is larger, but the TIA actively
#    bootstraps it.
#
#  S_amp derivation:
#    NEP (datasheet, calculated) = 3.0 pW/√Hz for FC-NIR.
#    NEP is the input-referred optical noise equivalent power.
#    Input current noise:  i_n = NEP × R = 3.0e-12 × 0.65 ≈ 1.95 pA/√Hz
#    TIA output voltage noise:  S_amp = i_n × Z_eff ≈ 0.45 µV/√Hz
#    (This S_amp is what the script's  I_amp = S_amp / Z  recovers.)
#
#  *** CRITICAL POWER CONSTRAINT ***
#    Saturation limit:  < 100 µW (datasheet)
#    Output voltage rail:  0–1 V
#    At Z_eff = 230 kΩ, the output saturates when:
#      I_DC > 1 V / 230 kΩ ≈ 4.3 µA  →  P_total < 6.7 µW
#    With two beams (P_i + P_REF) this means each beam must be
#    kept below ~3 µW for linear operation.
#    The default here uses P_i = P_REF = 2 µW (4 µW total, ~60% of rail).
#    *** DO NOT use the 10 mW values from the baseline config! ***
#
#  Dark current:
#    Not stated explicitly in the datasheet.  The NEP-derived amp noise
#    dominates at these power levels; dark current shot noise is negligible
#    in comparison.  A conservative 1 nA is used (typical InGaAs at room
#    temperature with reverse bias).
#
#  All frequencies in Hz unless otherwise noted.
# ============================================================


# ------------------------------------------------------------
[beatnote]
# ------------------------------------------------------------

f_het_min = 5e6
f_het_max = 25e6

f_inter_min = 25e6
f_inter_max = 60e6

doppler_max = 2e6

f_het = 18e6        # operating heterodyne beatnote [Hz]


# ------------------------------------------------------------
[modulation]
# ------------------------------------------------------------

nu_m          = 10e6    # EOM modulation frequency [Hz]
delta_f_SB    = 1e6     # clock sideband offset [Hz]


# ------------------------------------------------------------
[clocks]
# ------------------------------------------------------------

f_USO = 10e6
f_s   = 80e6


# ------------------------------------------------------------
[geometry]
# ------------------------------------------------------------

tau = 8.33          # one-way light travel time [s]  (emulated)


# ------------------------------------------------------------
[science_band]
# ------------------------------------------------------------

f_science_min = 1e-4
f_science_max = 1.0
f_TDI_null    = 0.060


# ------------------------------------------------------------
[instrument]
# ------------------------------------------------------------

PD_model = "Menlo FPD510-FC-NIR"
# EOM modulation depth
m   = 0.53

# ── Photodetector: Menlo FPD510-FC-NIR ───────────────────
#
# Responsivity @ 1064 nm (read from spectral response curve, Fig 2.3.1)
# The FC-NIR trace reaches ~0.65 A/W at 1064 nm.
# (FS-NIR peaks higher at ~0.80 A/W; FC variant is slightly lower.)
R   = 0.65          # [A/W]

# Heterodyne efficiency (unchanged from baseline)
eta = 0.8

# Effective C_pd for noise model
#   Z_eff = Gain / R = 1.5e5 / 0.65 ≈ 230,769 Ω
#   C_pd_eff = 1 / (2π × 18 MHz × 230,769 Ω) ≈ 38.3 fF
#   This effective value makes Z = 1/(2π C_pd f_het) = 230 kΩ in the script.
C_pd = 38.3e-15     # [F]  — effective value; NOT the physical junction capacitance

# Dark current [A]  (not stated in datasheet; conservative estimate for InGaAs)
# At these gain levels amp noise dominates; dark current contribution is minor.
I_dark = 1e-9       # [A]  conservative estimate

# TIA voltage noise ASD [V/sqrt(Hz)]
#   Derived from NEP = 3.0 pW/√Hz (datasheet, FC-NIR):
#     i_n = NEP × R = 3.0e-12 × 0.65 = 1.95 pA/√Hz
#     S_amp = i_n × Z_eff = 1.95e-12 × 230,769 ≈ 0.45 µV/√Hz
#   The script recovers I_amp = S_amp / Z, which then equals i_n. ✓
S_amp = 4.5e-7      # [V/sqrt(Hz)]

# *** OPTICAL POWER — READ THE WARNING ABOVE ***
# Saturation at P_total > ~6.7 µW.  Use 4 µW total (2 µW per beam).
# To maximise SNR within the linear range, raise these values only up to
# P_i + P_REF ≤ 5 µW  (leaving headroom for EOM sideband power).
P_i   = 2e-6        # [W]  SC laser power   — KEEP LOW, saturation at ~3 µW per beam
P_REF = 2e-6        # [W]  reference laser power


# ------------------------------------------------------------
[laser]
# ------------------------------------------------------------

# Laser wavelength [m]
wavelength = 1064e-9

# Laser RIN ASD [1/sqrt(Hz)]
RIN_level = 1e-8


# ------------------------------------------------------------
[noise]
# ------------------------------------------------------------

# Modulation (EOM clock) noise model:
#   sqrt(S_M(f)) = S_M0 * sqrt(1 + (f_corner_M / f)^2)
S_M0       = 1e-14   # white timing noise floor  [s/sqrt(Hz)]
f_corner_M = 1.5e-2  # 1/f corner frequency      [Hz]

# USO clock noise:  sqrt(S_q(f)) = S_q0 * f^{-3/2}
S_q0 = 1e-14         # [s/sqrt(Hz)] at 1 Hz


# ------------------------------------------------------------
[environment]
# ------------------------------------------------------------

# Operating temperature [K]
T = 300